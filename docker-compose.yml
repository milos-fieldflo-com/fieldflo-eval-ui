services:
  backend:
    build:
      context: ..
      dockerfile: fieldflo-eval-ui/backend/Dockerfile
      target: ${BUILD_TARGET:-base}
    ports:
      - "3101:3101"
    env_file:
      - backend/.env
    environment:
      - PROJECT_ROOT=/app
    volumes:
      - eval-results:/app/evals/results/sessions

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    depends_on:
      - backend

volumes:
  eval-results:
